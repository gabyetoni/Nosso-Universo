<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa para o Toni</title>
    <style>
        body { background-color: #030308; color: #ffffff; text-align: center; font-family: 'Georgia', serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; }
        #tela-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #030308; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #conteudo { display: none; width: 100%; padding-bottom: 50px; }
        #foto-centro { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 4px solid #3366ff; box-shadow: 0 0 30px #3366ff; margin-bottom: 20px; }
        .botao { padding: 20px 40px; font-size: 18px; border-radius: 50px; border: 2px solid #3366ff; background: transparent; color: white; cursor: pointer; }
        .botao-spotify { color: #1DB954; border: 2px solid #1DB954; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-top: 20px; display: inline-block; }
        #capa-jardim { width: 80%; max-width: 300px; border-radius: 12px; margin-top: 20px; }
        .estrela { position: fixed; border-radius: 50%; background: white; pointer-events: none; animation: viajar linear infinite; }
        @keyframes viajar { 0% { transform: translate(0, 0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(100vw, 100vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="tela-inicio">
        <h1>Para o meu amor</h1>
        <button class="botao" onclick="iniciarSurpresa()">Abrir Surpresa ✨</button>
    </div>

    <div id="conteudo">
        <h1>Gaby e Toni</h1>
        <p><i>"Você virou todo o meu universo"</i></p>
        <img src="https://i.postimg.cc/zBhvcrT4/ele.jpg" id="foto-centro">
        <br>
        <a href="https://open.spotify.com/playlist/2IPLDAPUPVga9KVsVys7R?si=0b9118fcfbdd45b4" class="botao-spotify">Ouvir Nossa Playlist ❤️
