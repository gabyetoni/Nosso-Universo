<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa</title>
    <style>
        body { background-color: #030308; color: #ffffff; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #tela-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #030308; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #conteudo { display: none; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 20px; border: 2px solid #3366ff; background: transparent; color: white; }
    </style>
</head>
<body>

    <div id="tela-inicio">
        <h1>Para o meu amor</h1>
        <button onclick="iniciarSurpresa()">Abrir Surpresa ✨</button>
    </div>

    <div id="conteudo">
        <h1>Gaby e Toni</h1>
        <audio id="musica" src="musica.mp3" loop></audio>
    </div>

    <script>
        function iniciarSurpresa() {
            // Esconde a tela de início
            document.getElementById('tela-inicio').style.display = 'none';
            // Mostra o conteúdo
            document.getElementById('conteudo').style.display = 'block';
            
            // Tenta reproduzir
            var audio = document.getElementById('musica');
            audio.play().then(function() {
                console.log("Música iniciada!");
            }).catch(function(error) {
                console.log("Erro ao tocar:", error);
            });
        }
    </script>
</body>
</html>
